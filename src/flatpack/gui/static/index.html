<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>flatpack — seam editor</title>
<link rel="stylesheet" href="/style.css">
<link rel="icon" href="data:,">
<script type="importmap">
  { "imports": { "three": "/vendor/three.module.min.js" } }
</script>
</head>
<body>
<div id="viewport">
  <div id="nav-help" title="Fusion 360 style navigation">
    <b>navigate:</b> middle-drag pan&ensp;·&ensp;<kbd>Shift</kbd>+middle-drag orbit&ensp;·&ensp;wheel zoom
  </div>
</div>

<aside id="sidebar">
  <h1>flatpack</h1>
  <div id="mesh-info" class="muted">loading mesh…</div>
  <div id="mesh-dims" class="muted"></div>
  <label class="check"><input type="checkbox" id="show-edges" checked> show mesh edges</label>
  <div class="row">
    <button id="apply-scale" title="Multiply all mesh coordinates — use when the mesh imported in the wrong units (everything downstream expects millimetres)">Scale ×</button>
    <input id="scale-factor" type="number" value="25.4" step="any">
  </div>
  <div class="row">
    <button class="preset-scale" data-f="25.4" title="inches to mm">in→mm</button>
    <button class="preset-scale" data-f="10" title="centimetres to mm">cm→mm</button>
    <button class="preset-scale" data-f="1000" title="metres to mm">m→mm</button>
  </div>
  <button id="reset-mesh" class="hidden" title="Undo all edits (cuts and scaling) and restore the original mesh">Reset mesh edits</button>

  <section>
    <h2>Mode</h2>
    <div id="mode-buttons">
      <button id="mode-orbit" class="mode active" title="Rotate/pan/zoom only">Orbit</button>
      <button id="mode-seam" class="mode" title="Click vertices; the seam follows the surface between clicks">Draw seam</button>
      <button id="mode-notch" class="mode" title="Click a vertex to add a match notch">Notch</button>
      <button id="mode-grain" class="mode" title="Click two vertices to set the selected panel's grainline">Grainline</button>
      <button id="mode-measure" class="mode" title="Click two vertices to measure the straight-line distance in mm">Measure</button>
      <button id="mode-dart" class="mode" title="Click a boundary/seam vertex (dart mouth), then the apex; the flattener computes the intake">Dart</button>
      <button id="mode-mark" class="mode" title="Place sewing marks: bar tacks, attachment points">Mark</button>
      <button id="mode-addv" class="mode" title="Click the mesh to insert a new vertex on the nearest edge — for seams that need to reach a spot with no vertex">Add vertex</button>
    </div>
    <div id="mode-hint" class="muted"></div>
    <div id="measure-out" class="muted"></div>
    <div id="measure-rescale" class="row hidden">
      <span class="muted">is really</span>
      <input id="measure-target" type="number" step="any" placeholder="mm">
      <button id="measure-apply" title="Rescale the whole mesh so the measured span becomes this length">Rescale</button>
    </div>
    <div id="mark-opts" class="hidden">
      <label>Mark type
        <select id="mark-type">
          <option value="bartack">bar tack</option>
          <option value="attach">attachment point</option>
        </select>
      </label>
      <label>Label <input id="mark-label" type="text" placeholder="e.g. shoulder strap"></label>
    </div>
  </section>

  <section>
    <h2>Seams</h2>
    <label class="check" title="Cut straight across triangles between clicks (new vertices are inserted) instead of following existing mesh edges">
      <input type="checkbox" id="straight-cut"> straight cut (diagonal, across faces)
    </label>
    <ul id="seam-list"></ul>
    <div class="row">
      <button id="finish-seam" disabled>Finish seam</button>
      <button id="undo-leg" disabled>Undo leg</button>
      <button id="to-edge" disabled title="Extend the current seam along the surface to the nearest mesh boundary">To edge</button>
    </div>
  </section>

  <section>
    <h2>Darts &amp; marks</h2>
    <ul id="dart-list"></ul>
    <ul id="mark-list"></ul>
  </section>

  <section>
    <h2>Panels</h2>
    <button id="preview-split">Preview split</button>
    <ul id="panel-list"></ul>
    <div id="panel-props" class="hidden">
      <label>Name <input id="panel-name" type="text"></label>
      <label>Fabric
        <select id="panel-fabric">
          <option>rigid</option><option>silnylon</option><option>xpac</option>
          <option>ultrastretch</option><option>powermesh</option>
        </select>
      </label>
      <label>Stretch axis (° from grain) <input id="panel-axis" type="number" value="0" step="5"></label>
      <div class="row">
        <span class="muted" id="panel-extra"></span>
        <button id="clear-grain" class="danger" disabled>✕ Remove grainline</button>
      </div>
    </div>
  </section>

  <section>
    <h2>Output</h2>
    <label>Seam allowance (mm) <input id="allowance" type="number" value="10" step="1"></label>
    <label>Edge lengths
      <select id="edge-units" title="Print each straight edge's length along the pattern boundary">
        <option value="none">off</option>
        <option value="cm">cm</option>
        <option value="in">inches</option>
      </select>
    </label>
    <div class="row">
      <button id="generate">Generate pattern</button>
      <button id="save-spec">Save seams.yaml</button>
    </div>
    <div id="status" class="muted"></div>
    <pre id="report" class="hidden"></pre>
    <div id="downloads"></div>
  </section>
</aside>

<div id="svg-preview" class="hidden">
  <div id="svg-preview-inner">
    <button id="close-preview">close ×</button>
    <img id="svg-img" alt="generated pattern">
  </div>
</div>

<script type="module" src="/app.js"></script>
</body>
</html>
