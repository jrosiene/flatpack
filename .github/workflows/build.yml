name: build

on:
  push:
    branches: [main, "claude/**"]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run pytest -q

  # The standalone Windows executable is no longer built in CI (the
  # artifact route proved awkward to distribute). To build it yourself on
  # a Windows machine:
  #
  #   pip install . "pyinstaller>=6.0"
  #   pyinstaller packaging/flatpack.spec
  #
  # which produces dist/flatpack.exe. See README "Building the
  # executable yourself".
